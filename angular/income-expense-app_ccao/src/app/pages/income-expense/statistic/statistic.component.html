<div class="row">
  <div class="col-6">
    <div class="card card-statistics">
      <div class="card-body">
        <div class="clearfix">
          <div class="float-left">
            <i class="fa fa-money-bill-alt text-success icon-lg"></i>
          </div>

          <div class="float-right">
            <p class="mb-0 text-right">Ingresos</p>
            <h3 class="font-weight-medium text-right mb-0">
              {{ totalIncomes | currency }}
            </h3>
          </div>
        </div>

        <p class="text-muted mt-3 mb-0">{{ incomes }} items</p>
      </div>
    </div>
  </div>

  <div class="col-6">
    <div class="card card-statistics">
      <div class="card-body">
        <div class="clearfix">
          <div class="float-left">
            <i class="fa fa-shipping-fast text-danger icon-lg"></i>
          </div>

          <div class="float-right">
            <p class="mb-0 text-right">Egresos</p>
            <h3 class="font-weight-medium text-right mb-0">
              {{ totalExpense | currency }}
            </h3>
          </div>
        </div>

        <p class="text-muted mt-3 mb-0">{{ expenses }} items</p>
      </div>
    </div>
  </div>
</div>

<div class="row m-5">
  <div class="col-12">
    <div class="card card-statistics">
      <div class="card-body">
        <div class="clearfix">
          <div class="float-left">
            <i class="fa fa-building text-info icon-lg"></i>
          </div>

          <div class="float-right">
            <p class="mb-0 text-right">Diferencia</p>

            <h3
              [class.text-success]="totalIncomes - totalExpense >= 0"
              [class.text-danger]="totalIncomes - totalExpense < 0"
            >
              {{ totalIncomes - totalExpense | currency }}
            </h3>
          </div>
        </div>
      </div>
    </div>
  </div>

  @if (incomes > 0 || expenses > 0) {
    <div class="col-12 p-5">
      <div class="card card-statistics">
        <div class="card-body">
          <h3 class="card-title mb-3">Gráfica</h3>

          <div style="height: 320px; position: relative">
            <canvas #chartCanvas></canvas>
          </div>
        </div>
      </div>
    </div>
  }
</div>
