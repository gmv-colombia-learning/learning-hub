<!-- List items should get the class `editing` when editing and `completed` when marked as completed -->
<li [class.completed]="todoItem.completed" [class.editing]="isEditing">
  <div class="view">
    <input class="toggle" type="checkbox" [formControl]="chkComplete" />
    <label (dblclick)="editItem()">{{ todoItem.text }}</label>
    <button class="destroy" (click)="deleteTodo()"></button>
  </div>
  <input #editInput class="edit" type="text" [formControl]="itemInput" (blur)="endEditing()"/>
</li>
